<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Level 4</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: lime;
      font-family: monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 80%;
      max-width: 900px;
      min-height: 500px;
      border: 2px solid lime;
      box-shadow: 0 0 20px lime;
      padding: 30px;
      background: black;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      text-shadow: 0 0 10px lime;
    }

    input {
      background: black;
      color: lime;
      border: 1px solid lime;
      font-family: monospace;
      font-size: 24px;
      text-align: center;
      padding: 10px;
      width: 220px;
      letter-spacing: 8px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 16px;
      background: black;
      color: lime;
      border: 1px solid lime;
      font-family: monospace;
      cursor: pointer;
    }

    button:hover {
      background: lime;
      color: black;
    }

    #result {
      margin-top: 25px;
      min-height: 40px;
      font-size: 22px;
      color: gold;
      text-shadow: 0 0 10px gold;
    }

    #history {
      margin-top: 30px;
      text-align: left;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      white-space: pre-wrap;
      line-height: 1.8;
    }

    #nextButton {
      display: none;
      margin-top: 30px;
      box-shadow: 0 0 10px lime;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>█ LEVEL 4 : CODE BREAKER █</h1>
    <p>Enter the 5-digit code. Yellow = correct digit in correct place.</p>

    <input type="text" id="guessInput" maxlength="5" placeholder="00000">
    <button onclick="checkGuess()">ENTER</button>

    <div id="result"></div>
    <div id="history"></div>

    <button id="nextButton" onclick="goNext()">NEXT LEVEL</button>
  </div>

  <script>
    const guessInput = document.getElementById("guessInput");
    const result = document.getElementById("result");
    const history = document.getElementById("history");
    const nextButton = document.getElementById("nextButton");

    // 🔥 RANDOM KOD PER SPELARE
    let secretCode = localStorage.getItem("level4code");

    if (!secretCode) {
      secretCode = "";
      for (let i = 0; i < 5; i++) {
        secretCode += Math.floor(Math.random() * 10);
      }
      localStorage.setItem("level4code", secretCode);
    }

    function checkGuess() {
      const guess = guessInput.value.trim();

      if (!/^\d{5}$/.test(guess)) {
        result.textContent = "ENTER EXACTLY 5 DIGITS";
        return;
      }

      let correctPositions = 0;

      for (let i = 0; i < 5; i++) {
        if (guess[i] === secretCode[i]) {
          correctPositions++;
        }
      }

      history.textContent += `> ${guess}  →  ${correctPositions} correct\n`;

      if (correctPositions === 5) {
        result.textContent = "ACCESS GRANTED";
        nextButton.style.display = "inline-block";
        guessInput.disabled = true;

        // 🔥 RENSAR KODEN EFTER KLARAD NIVÅ
        localStorage.removeItem("level4code");

      } else {
        result.textContent = `${correctPositions} correct`;
      }

      guessInput.value = "";
      guessInput.focus();
    }

    function goNext() {
      window.location.href = "level5.html";
    }

    guessInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkGuess();
      }
    });

    guessInput.focus();
  </script>
</body>
</html>
