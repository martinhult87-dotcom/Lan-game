<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Level 5</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: lime;
      font-family: monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      width: 400px;
      border: 2px solid lime;
      box-shadow: 0 0 20px lime;
      padding: 30px;
      background: black;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      text-shadow: 0 0 10px lime;
    }

    .field {
      margin: 20px 0;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      background: black;
      color: lime;
      border: 1px solid lime;
      padding: 10px;
      font-family: monospace;
      font-size: 16px;
      outline: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 16px;
      background: black;
      color: lime;
      border: 1px solid lime;
      font-family: monospace;
      cursor: pointer;
    }

    button:hover {
      background: lime;
      color: black;
    }

    #result {
      margin-top: 20px;
      min-height: 30px;
      white-space: pre-wrap;
    }

    #nextButton {
      display: none;
      margin-top: 20px;
      box-shadow: 0 0 10px lime;
    }

    .tiny-hint {
      margin-top: 15px;
      font-size: 12px;
      color: #1a1a1a;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>█ LEVEL 5 : LOGIN █</h1>

    <div class="field">
      <label for="username">USERNAME</label>
      <input type="text" id="username" value="admin">
    </div>

    <div class="field">
      <label for="password">PASSWORD</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <button onclick="checkLogin()">LOGIN</button>

    <div id="result"></div>

    <button id="nextButton" onclick="goNext()">NEXT LEVEL</button>

    <div class="tiny-hint">nothing to see here...</div>
  </div>

  <!--
    SYSTEM NOTE:
    If access fails, inspect the source.
    PASSWORD = rootkey
  -->

  <script>
    const correctUsername = "admin";
    const correctPassword = "rootkey";

    const result = document.getElementById("result");
    const nextButton = document.getElementById("nextButton");

    function checkLogin() {
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim().toLowerCase();

      if (username === correctUsername && password === correctPassword) {
        result.textContent = "ACCESS GRANTED";
        nextButton.style.display = "inline-block";
      } else {
        result.textContent = "ACCESS DENIED";
      }
    }

    function goNext() {
      window.location.href = "v9k3t8.html";
    }

    document.getElementById("password").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkLogin();
      }
    });
  </script>
</body>
</html>
