<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Final Level</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: lime;
      font-family: monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 85%;
      max-width: 900px;
      min-height: 560px;
      border: 2px solid lime;
      box-shadow: 0 0 20px lime;
      padding: 30px;
      box-sizing: border-box;
      text-align: center;
      background: black;
    }

    h1 {
      margin-top: 0;
      text-shadow: 0 0 10px lime;
    }

    #stageTitle {
      margin-top: 25px;
      font-size: 24px;
    }

    #question {
      margin-top: 30px;
      font-size: 28px;
      line-height: 1.8;
      min-height: 120px;
      white-space: pre-wrap;
    }

    #subtext {
      margin-top: 10px;
      color: #9f9;
      min-height: 24px;
    }

    input {
      margin-top: 25px;
      padding: 12px;
      width: 260px;
      font-size: 20px;
      text-align: center;
      background: black;
      color: lime;
      border: 1px solid lime;
      font-family: monospace;
      outline: none;
    }

    button {
      margin-top: 20px;
      padding: 10px 18px;
      background: black;
      color: lime;
      border: 1px solid lime;
      font-family: monospace;
      cursor: pointer;
    }

    button:hover {
      background: lime;
      color: black;
    }

    #result {
      margin-top: 25px;
      min-height: 40px;
      font-size: 22px;
      white-space: pre-wrap;
    }

    .success {
      color: gold;
      text-shadow: 0 0 10px gold;
    }

    .error {
      color: #ff6666;
      text-shadow: 0 0 10px #ff3333;
    }

    #finalMessage {
      margin-top: 40px;
      font-size: 26px;
      display: none;
      color: gold;
      text-shadow: 0 0 12px gold;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>█ FINAL ACCESS █</h1>
    <p>Collect all 5 digits. Remember them.</p>

    <div id="stageTitle"></div>
    <div id="question"></div>
    <div id="subtext"></div>

    <input type="text" id="answerInput" autocomplete="off" placeholder="Type answer here">
    <br>
    <button id="submitButton" onclick="checkAnswer()">ENTER</button>

    <div id="result"></div>
    <div id="finalMessage"></div>
  </div>

  <script>
    const stageTitle = document.getElementById("stageTitle");
    const question = document.getElementById("question");
    const subtext = document.getElementById("subtext");
    const answerInput = document.getElementById("answerInput");
    const result = document.getElementById("result");
    const finalMessage = document.getElementById("finalMessage");
    const submitButton = document.getElementById("submitButton");

    const stages = [
      {
        title: "STAGE 1",
        question: "2 → 4\n3 → 6\n4 → 8\n5 → ?",
        subtext: "Enter the answer.",
        answers: ["10"],
        digit: "0"
      },
      {
        title: "STAGE 2",
        question: "CAT = 3\nDOG = 3\nELEPHANT = ?",
        subtext: "Enter the answer.",
        answers: ["8"],
        digit: "8"
      },
      {
        title: "STAGE 3",
        question: "1 3 5 7 9 ?",
        subtext: "Enter the next number.",
        answers: ["11"],
        digit: "1"
      },
      {
        title: "STAGE 4",
        question: "8 × 3 = ?",
        subtext: "Enter the answer.",
        answers: ["24"],
        digit: "4"
      },
      {
        title: "STAGE 5",
        question: "Write the number of letters in\nTEN",
        subtext: "Enter the answer.",
        answers: ["3", "three"],
        digit: "3"
      },
      {
        title: "FINAL CODE",
        question: "Enter the full 5-digit code.",
        subtext: "Use the digits from the previous stages.",
        answers: ["08143"],
        digit: null
      }
    ];

    let currentStage = 0;

    function showStage() {
      result.textContent = "";
      result.className = "";
      answerInput.value = "";
      answerInput.focus();

      const stage = stages[currentStage];
      stageTitle.textContent = stage.title;
      question.textContent = stage.question;
      subtext.textContent = stage.subtext;
    }

    function checkAnswer() {
      const stage = stages[currentStage];
      const answer = answerInput.value.trim().toLowerCase();

      if (stage.answers.includes(answer)) {
        if (stage.digit !== null) {
          result.className = "success";
          result.textContent = `CORRECT\nYour digit is: ${stage.digit}\nRemember it.`;

          currentStage++;

          setTimeout(() => {
            showStage();
          }, 1800);
        } else {
          result.className = "success";
          result.textContent = "FINAL CODE ACCEPTED";

          stageTitle.style.display = "none";
          question.style.display = "none";
          subtext.style.display = "none";
          answerInput.style.display = "none";
          submitButton.style.display = "none";
          result.style.display = "none";

          finalMessage.style.display = "block";
          finalMessage.textContent = "Did the page not load?\nPress F5 to try again...";
        }
      } else {
        result.className = "error";
        result.textContent = "WRONG ANSWER";
        answerInput.select();
      }
    }

    answerInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });

    showStage();
  </script>
</body>
</html>
